<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <title>NIN DEFENDER</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#cc0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

<body>
    <canvas id="gameCanvas"></canvas>
    <div id="touchControls">
        <div id="joystickArea">
            <div id="joystickBase">
                <div id="joystickKnob"></div>
            </div>
        </div>
        <div id="fireButton">FIRE</div>
    </div>
    <div id="touchActions">
        <div id="shieldBtn" class="touch-action-btn">SHLD</div>
        <div id="bombBtn" class="touch-action-btn">BOMB</div>

    <div id="muteBtn" title="Toggle Sound">&#x1f50a;</div>
    <div id="portraitWarning">
        <div class="rotate-icon">📱</div>
        <p>ROTATE YOUR DEVICE TO LANDSCAPE</p>
    </div>

    <script src="js/player.js?v=BUILD_VERSION"></script>
    <script src="js/enemies.js?v=BUILD_VERSION"></script>
    <script src="js/animations.js?v=BUILD_VERSION"></script>
    <script src="js/ui.js?v=BUILD_VERSION"></script>
    <script src="js/game.js?v=BUILD_VERSION"></script>
    <script src="js/main.js?v=BUILD_VERSION"></script>
