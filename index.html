<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <title>GALACTIC DEFENDER</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="touchControls">
        <div id="joystickArea">
            <div id="joystickBase">
                <div id="joystickKnob"></div>
            </div>
        </div>
        <div id="fireButton">FIRE</div>
    </div>
    <div id="touchActions">
        <div id="shieldBtn" class="touch-action-btn">SHLD</div>
        <div id="bombBtn" class="touch-action-btn">BOMB</div>
    </div>
    <div id="muteBtn" title="Toggle Sound">&#x1f50a;</div>
    <div id="portraitWarning">
        <div class="rotate-icon">📱</div>
        <p>ROTATE YOUR DEVICE TO LANDSCAPE</p>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/background.js"></script>
    <script src="js/projectiles.js"></script>
    <script src="js/powerups.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
