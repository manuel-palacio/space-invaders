<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <title>NIN DEFENDER</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000'/><text x='50' y='72' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='52' fill='%23cc0000'>NIN</text></svg>">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="touchControls">
        <div id="joystickArea">
            <div id="joystickBase">
                <div id="joystickKnob"></div>
            </div>
        </div>
        <div id="fireButton">FIRE</div>
    </div>
    <div id="touchActions">
        <div id="shieldBtn" class="touch-action-btn">SHLD</div>
        <div id="bombBtn" class="touch-action-btn">BOMB</div>
    </div>
    <div id="muteBtn" title="Toggle Sound">&#x1f50a;</div>
    <div id="portraitWarning">
        <div class="rotate-icon">📱</div>
        <p>ROTATE YOUR DEVICE TO LANDSCAPE</p>
    </div>

    <script src="js/utils.js?v=2"></script>
    <script src="js/particles.js?v=2"></script>
    <script src="js/background.js?v=2"></script>
    <script src="js/projectiles.js?v=2"></script>
    <script src="js/powerups.js?v=2"></script>
    <script src="js/player.js?v=2"></script>
    <script src="js/enemies.js?v=2"></script>
    <script src="js/game.js?v=2"></script>
    <script src="js/main.js?v=2"></script>
</body>
</html>
